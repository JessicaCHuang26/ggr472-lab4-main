<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GGR472 Lab 4</title>
    <!-- mapbox API -->
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.10.0/mapbox-gl.js"></script>
    <link
      href="https://api.mapbox.com/mapbox-gl-js/v3.10.0/mapbox-gl.css"
      rel="stylesheet"
    />
    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />
    <!-- Turf.js -->
    <script src="https://unpkg.com/@turf/turf@7.2.0/turf.min.js"></script>
  </head>

  <body>
    <!-- MAP CONTAINER -->
    <div id="map" class="map"></div>

    <!-- LEGEND -->
    <div class="legend">
      <div class="legend-title">Legend</div>
      <div class="legend-subtitle">
        Collision Count (per 0.6 km hexagonal grid)
      </div>
      <div id="legend-items"></div>
    </div>

    <!-- LEGEND_2 -->
    <div class="legend legend2">
      <div class="legend-title">Layers</div>
      <div id="legend-items2"></div>
    </div>

    <div class="map-title">
      Toronto Pedestrian & Cyclist Collisions (2006–2021)
    </div>
    <!-- distance -->
    <div id="map"></div>
    <button id="measure-toggle" type="button">Measure Distance</button>
    <div id="distance" class="distance-container"></div>
    <!-- reset orentation -->
    <button id="reset-view" class="reset-view">Reset View</button>

    <script src="script.js"></script>
  </body>
</html>
